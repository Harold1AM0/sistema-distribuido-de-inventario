services:

  mysql-inventario:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventario_db
    ports:
      - "3306:3306"

  mysql-reporte:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: reporte_db
    ports:
      - "3307:3306"

  inventario-service-1:
    build: ./inventario-service
    depends_on:
      - mysql-inventario
      - reporte-service

  inventario-service-2:
    build: ./inventario-service
    depends_on:
      - mysql-inventario
      - reporte-service

  reporte-service:
    build: ./reporte-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql-reporte

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - inventario-service-1
      - inventario-service-2