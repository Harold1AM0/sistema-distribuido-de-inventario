services:

  mysql-inventario:
    image: mysql:8.0
    container_name: mysql-inventario
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventario_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-reporte:
    image: mysql:8.0
    container_name: mysql-reporte
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: reporte_db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventario-service-1:
    build: ./inventario-service
    depends_on:
      mysql-inventario:
        condition: service_healthy
      reporte-service:
        condition: service_started

  reporte-service:
    build: ./reporte-service
    container_name: reporte-service
    ports:
      - "8081:8081"
    depends_on:
      mysql-reporte:
        condition: service_healthy

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      inventario-service-1:
        condition: service_started